<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TRPG 전술 보드</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="app" aria-label="TRPG 전술 보드">
      <aside id="duelBar" class="duel-bar" aria-label="주사위 판정 대결">
        <header>
          <span>판정 대결</span>
          <strong id="duelTitle">대기 중</strong>
        </header>
        <div id="duelUnits" class="duel-units">
          <p>적 유닛 위로 드래그하면 판정 대결이 준비됩니다.</p>
        </div>
        <div id="duelStats" class="duel-stats"></div>
        <div id="duelResult" class="duel-result">
          <span>공격자와 방어자의 능력치를 각각 선택하세요.</span>
        </div>
        <label class="webhook-field">
          디스코드 웹훅
          <input id="discordWebhook" type="password" placeholder="Webhook URL">
        </label>
      </aside>

      <section class="board-wrap" aria-label="배틀 맵">
        <div class="board-frame">
          <div id="board" class="board" aria-label="10 x 8 전술 격자"></div>
        </div>
      </section>

      <aside id="detailBar" class="detail-bar" aria-label="유닛 상세 능력치">
        <div class="empty-detail" id="emptyDetail">
          <strong>유닛 선택</strong>
          <p>말을 우클릭하면 상세 능력치가 표시됩니다.</p>
        </div>

        <form id="unitSheet" class="unit-sheet" hidden>
          <header class="sheet-head">
            <div>
              <span id="sheetType" class="sheet-type">아군</span>
              <input id="sheetName" class="sheet-name" type="text" aria-label="이름">
            </div>
            <button id="deleteUnit" class="danger" type="button">삭제</button>
          </header>

          <section class="vital-section" aria-label="체력과 스테미나">
            <label>
              <b>체력</b>
              <span class="vital-inputs">
                <input id="unitHp" type="number" min="0" max="999">
                /
                <input id="unitMaxHp" type="number" min="1" max="999">
              </span>
            </label>
            <label>
              <b>스테미나</b>
              <span class="vital-inputs">
                <input id="unitStamina" type="number" min="0" max="999">
                /
                <input id="unitMaxStamina" type="number" min="1" max="999">
              </span>
            </label>
          </section>

          <section aria-label="주능력치">
            <h2>주능력치</h2>
            <div id="primaryStats" class="primary-stats"></div>
          </section>

          <section aria-label="스킬">
            <div class="section-title">
              <h2>스킬</h2>
              <button id="addSkill" type="button" aria-label="스킬 추가">+</button>
            </div>
            <div id="skillList" class="skill-list"></div>
          </section>
        </form>
      </aside>

      <section class="control-bar" aria-label="맵 조작">
        <div class="legend" aria-label="말 종류">
          <span><i class="dot player"></i>플레이어</span>
          <span><i class="dot ally"></i>아군</span>
          <span><i class="dot enemy"></i>적군</span>
          <span><i class="box obstacle"></i>장애물</span>
        </div>

        <div class="add-tools" aria-label="말 추가">
          <strong>추가:</strong>
          <button type="button" data-add="ally">아군</button>
          <button type="button" data-add="enemy">적군</button>
          <button type="button" data-add="obstacle">장애물</button>
        </div>

        <div class="map-tools">
          <button id="resetMap" type="button">맵 재설정</button>
          <button id="editMap" type="button">맵만 수정</button>
          <button id="saveLoadMap" type="button">맵 저장/불러오기</button>
        </div>

        <div class="log" aria-live="polite">
          <span id="logIcon">⚔</span>
          <p id="battleLog">배틀맵 [10 x 8] 생성 완료. 유닛은 드래그로 이동하고, 우클릭으로 상세 능력치를 봅니다.</p>
        </div>
      </section>
    </main>

    <form id="mapModal" class="modal" aria-label="맵 재설정" hidden>
      <section class="modal-panel">
        <header>
          <h2>맵 재설정</h2>
          <button id="closeMapModal" type="button" aria-label="닫기">×</button>
        </header>
        <div class="map-form-grid">
          <label>
            가로 값
            <input id="mapCols" type="number" min="4" max="30" value="10">
          </label>
          <label>
            세로 값
            <input id="mapRows" type="number" min="4" max="30" value="8">
          </label>
          <label>
            아군 말 갯수
            <input id="mapAllies" type="number" min="0" max="99" value="3">
          </label>
          <label>
            적군 말 갯수
            <input id="mapEnemies" type="number" min="0" max="99" value="4">
          </label>
          <label>
            장애물 값
            <input id="mapObstacles" type="number" min="0" max="99" value="5">
          </label>
        </div>
        <p>플레이어 말판은 항상 1개 생성됩니다.</p>
        <div class="map-modal-saves">
          <h3>저장된 맵</h3>
          <div id="mapSaveList" class="save-list compact-save-list" aria-label="맵 재설정 저장 기록"></div>
          <div class="map-save-actions">
            <button id="mapSaveButton" type="button">저장하기</button>
            <button id="mapLoadButton" type="button">불러오기</button>
          </div>
        </div>
        <menu>
          <button id="cancelMapModal" type="button">취소</button>
          <button type="submit">생성</button>
        </menu>
      </section>
    </form>

    <form id="editMapModal" class="modal" aria-label="맵만 수정" hidden>
      <section class="modal-panel">
        <header>
          <h2>맵만 수정</h2>
          <button id="closeEditMapModal" type="button" aria-label="닫기">×</button>
        </header>
        <div class="map-form-grid">
          <label>
            가로 값
            <input id="editMapCols" type="number" min="4" max="30" value="10">
          </label>
          <label>
            세로 값
            <input id="editMapRows" type="number" min="4" max="30" value="8">
          </label>
          <label>
            장애물 값
            <input id="editMapObstacles" type="number" min="0" max="99" value="5">
          </label>
          <label>
            추가 아군 말
            <input id="editMapAddAllies" type="number" min="0" max="99" value="0">
          </label>
          <label>
            추가 적군 말
            <input id="editMapAddEnemies" type="number" min="0" max="99" value="0">
          </label>
        </div>
        <p>기존 말의 이름, 체력, 스킬, 능력치는 유지하고 맵과 장애물만 바꿉니다.</p>
        <menu>
          <button id="cancelEditMapModal" type="button">취소</button>
          <button type="submit">수정</button>
        </menu>
      </section>
    </form>

    <section id="saveLoadModal" class="modal" aria-label="맵 저장과 불러오기" hidden>
      <div class="modal-panel save-panel">
        <header>
          <h2>맵 저장/불러오기</h2>
          <button id="closeSaveLoadModal" type="button" aria-label="닫기">×</button>
        </header>
        <div id="saveList" class="save-list" aria-label="저장된 기록"></div>
        <menu>
          <button id="saveMapButton" type="button">저장하기</button>
          <button id="loadMapButton" type="button">불러오기</button>
        </menu>
      </div>
    </section>

    <form id="nameModal" class="modal" aria-label="저장 이름 입력" hidden>
      <section class="modal-panel">
        <header>
          <h2>새로 저장하기</h2>
          <button id="closeNameModal" type="button" aria-label="닫기">×</button>
        </header>
        <label class="single-field">
          저장할 이름
          <input id="saveNameInput" type="text" maxlength="40" autocomplete="off">
        </label>
        <menu>
          <button id="cancelNameModal" type="button">취소</button>
          <button type="submit">저장</button>
        </menu>
      </section>
    </form>

    <section id="confirmModal" class="modal" aria-label="확인" hidden>
      <div class="modal-panel">
        <header>
          <h2 id="confirmTitle">확인</h2>
        </header>
        <p id="confirmMessage"></p>
        <menu>
          <button id="confirmNo" type="button">아니오</button>
          <button id="confirmYes" type="button">예</button>
        </menu>
      </div>
    </section>

    <script src="game.js"></script>
  </body>
</html>
